# ---------------------------------------------------------------------------
# Activated automatically by DatabaseUrlEnvironmentPostProcessor when a
# Postgres-style DATABASE_URL is provided. The datasource url/username/password
# are injected by that processor (highest precedence); here we switch the
# driver/dialect and let Flyway own the schema + seed data.
# ---------------------------------------------------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway owns the schema on Postgres; JPA only maps to it.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=none
