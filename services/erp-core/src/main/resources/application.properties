# ---------------------------------------------------------------------------
# erp-core — Spring Boot config
#
# Port: ace-engine injects PORT (and passes --server.port={ace_port}); falls
# back to 8080 for local dev.
#
# Database: by DEFAULT this runs zero-infra against an embedded in-memory H2
# (PostgreSQL compatibility mode). When DATABASE_URL is present,
# DatabaseUrlEnvironmentPostProcessor rewrites the datasource to Postgres and
# enables Flyway (see application-postgres.properties). This keeps `mvn ... run`
# working with no external services.
# ---------------------------------------------------------------------------
server.port=${PORT:8080}
server.address=0.0.0.0
spring.application.name=erp-core

# --- Default datasource: embedded H2 (zero-infra) --------------------------
spring.datasource.url=jdbc:h2:mem:erp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 path: let JPA create the schema, and seed via DataSeeder. Flyway is only
# used on the Postgres profile (it owns schema + seed there).
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.locations=classpath:db/migration

# Demo seed (DataSeeder only inserts when tables are empty) — enabled by default
# for the starter experience; set SEED_DEMO=0 to disable.
erp.seed-demo=${SEED_DEMO:1}
